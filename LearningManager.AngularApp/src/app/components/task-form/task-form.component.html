<div class="lm-page" style="max-width:620px">
  <h4 style="font-weight:700;color:var(--lm-text);margin-bottom:1.5rem">
    {{ editId ? '✏️ Aufgabe bearbeiten' : '➕ Neue Aufgabe' }}
  </h4>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div class="lm-card">
    <form (ngSubmit)="save()" #f="ngForm" novalidate>
      <div class="mb-3">
        <label class="form-label" style="font-weight:600;color:var(--lm-text)">Titel *</label>
        <input class="form-control" [(ngModel)]="model.title" name="title"
          style="border-radius:10px;border-color:var(--lm-border)"
          required maxlength="200" />
      </div>
      <div class="mb-3">
        <label class="form-label" style="font-weight:600;color:var(--lm-text)">Beschreibung</label>
        <textarea class="form-control" [(ngModel)]="model.description" name="description"
          style="border-radius:10px;border-color:var(--lm-border)"
          rows="3" maxlength="2000"></textarea>
      </div>
      <div class="row g-3 mb-3">
        <div class="col">
          <label class="form-label" style="font-weight:600;color:var(--lm-text)">Fälligkeitsdatum *</label>
          <input type="date" class="form-control" [(ngModel)]="model.dueDate" name="dueDate"
            style="border-radius:10px;border-color:var(--lm-border)" required />
        </div>
        <div class="col">
          <label class="form-label" style="font-weight:600;color:var(--lm-text)">Geschätzte Stunden *</label>
          <input type="number" class="form-control" [(ngModel)]="model.estimatedHours" name="estimatedHours"
            style="border-radius:10px;border-color:var(--lm-border)"
            min="0.25" step="0.25" required />
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label" style="font-weight:600;color:var(--lm-text)">Status</label>
        <select class="form-select" [(ngModel)]="model.status" name="status"
          style="border-radius:10px;border-color:var(--lm-border)">
          <option *ngFor="let s of statusOptions" [value]="s">{{ s }}</option>
        </select>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn" [disabled]="saving || f.invalid"
          style="background:var(--lm-primary);color:#fff;border-radius:10px;font-weight:600;padding:.5rem 1.5rem">
          {{ saving ? 'Speichern…' : 'Speichern' }}
        </button>
        <button type="button" class="btn"
          style="background:var(--lm-primary-light);color:var(--lm-primary);border-radius:10px;font-weight:600;padding:.5rem 1.5rem"
          (click)="cancel()">Abbrechen</button>
      </div>
    </form>
  </div>
</div>
